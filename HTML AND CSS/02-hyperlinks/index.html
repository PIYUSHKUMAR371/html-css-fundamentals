<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlinks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hyperlinks 👈</h1>
    <p>Hyperlinks (links) let users navigate between pages and websites</p>
    
    <!-- EXAMPLE 1: External Link (to another website) -->
    <!-- <a> creates a link; href="" specifies the destination URL -->
    <!-- The text between <a> and </a> is what users see and click on -->
    <a href="https://www.example.com">Visit Example.com</a>
    
    <!-- EXAMPLE 2: Internal Link (to another page on your site) -->
    <!-- This would link to page in same folder -->
    <!-- <a href="about.html">Go to About Page</a> -->
    
    <!-- EXAMPLE 3: Link to Different Folder -->
    <!-- <a href="../03-images/index.html">Go to Images Lesson</a> -->
    <!-- ../ means go up one folder, then down into 03-images -->
    
    <!-- EXAMPLE 4: Email Link -->
    <!-- <a href="mailto:your@email.com">Send Me Email</a> -->
    
    <!-- EXAMPLE 5: Link with target attribute -->
    <!-- <a href="https://www.google.com" target="_blank">Open Google in New Tab</a> -->
    <!-- target="_blank" opens link in new tab instead of current tab -->
    
    <!-- TRY ADDING: -->
    <!-- - Links to other lesson folders -->
    <!-- - An email link -->
    <!-- - Links to your favorite websites -->
    <!-- - Add target="_blank" to open links in new tabs -->
    
</body>
</html>
