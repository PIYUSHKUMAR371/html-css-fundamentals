<!DOCTYPE html>
<!-- DOCTYPE tells the browser this is an HTML5 document -->

<html lang="en">
<!-- <html> is the root element that wraps all other elements -->
<!-- lang="en" tells search engines this page is in English -->

<head>
    <!-- <head> contains metadata (information about the page, not visible to users) -->
    
    <meta charset="UTF-8">
    <!-- UTF-8 allows the browser to display all characters correctly -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This makes the page responsive (works on phones, tablets, computers) -->
    
    <title>Introduction to HTML</title>
    <!-- <title> appears in the browser tab -->
    
    <link rel="stylesheet" href="style.css">
    <!-- This links to the CSS file that styles this page -->
</head>

<body>
    <!-- <body> contains all visible content that users see -->
    
    <h1>Welcome to HTML! 🌎</h1>
    <!-- <h1> is a heading - there are h1 to h6 headings (h1 is largest) -->
    
    <p>This is your first HTML page.</p>
    <!-- <p> is a paragraph - use this for text content -->
    
    <!-- TIP: Add more content here! Try:
         - More paragraphs with <p>
         - More headings with <h2>, <h3>
         - Links with <a href="url">text</a>
         - Images with <img src="image.jpg" alt="description">
    -->
    
</body>
</html>
