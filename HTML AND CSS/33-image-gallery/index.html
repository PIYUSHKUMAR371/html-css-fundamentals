<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Gallery 📷</h1>
    
    <div class="gallery">
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+1" alt="Gallery Image 1">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+2" alt="Gallery Image 2">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+3" alt="Gallery Image 3">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+4" alt="Gallery Image 4">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+5" alt="Gallery Image 5">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/200x200?text=Image+6" alt="Gallery Image 6">
        </div>
    </div>
    
    <!-- Start adding your image gallery content here -->
    
</body>
</html>
