<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Overflow 🌊</h1>
    
    <div class="overflow-visible">
        <h3>Overflow Visible</h3>
        <p>Content that overflows will be visible outside the container.</p>
    </div>
    
    <div class="overflow-hidden">
        <h3>Overflow Hidden</h3>
        <p>Content that overflows will be hidden behind the container.</p>
    </div>
    
    <div class="overflow-scroll">
        <h3>Overflow Scroll</h3>
        <p>Scroll bars appear to see all content.</p>
    </div>
    
    <div class="overflow-auto">
        <h3>Overflow Auto</h3>
        <p>Scroll bars appear only when needed.</p>
    </div>
    
    <!-- Start adding your overflow content here -->
    
</body>
</html>
