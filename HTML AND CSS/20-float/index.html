<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Float 🎈</h1>
    
    <div class="float-left">Left Float</div>
    <p>This text will wrap around the floated element on the left.</p>
    
    <div style="clear: both;"></div>
    
    <div class="float-right">Right Float</div>
    <p>This text will wrap around the floated element on the right.</p>
    
    <!-- Start adding your float content here -->
    
</body>
</html>
